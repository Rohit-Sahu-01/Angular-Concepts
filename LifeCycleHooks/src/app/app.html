<div class="container mt-4">
  <div class="text-center mb-4">
    <h2 class="text-success">🚀 Angular Lifecycle Hooks Visualizer</h2>
  </div>

  <div class="d-flex justify-content-center gap-3 mb-4">
    <button class="btn btn-primary" (click)="updateMessage()">
      🔄 Update Input
    </button>

    <button class="btn btn-danger" (click)="toggleComponent()">
      ❌ Destroy / Create
    </button>
  </div>

  <div *ngIf="showComponent">
    <app-lifecycle-demo [data]="message"></app-lifecycle-demo>
  </div>
</div>
